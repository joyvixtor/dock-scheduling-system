schema:
  - internal/delivery/graphql/schema/*.graphqls

exec:
  filename: internal/delivery/graphql/generated/generated.go
  package: generated

autobind:
  - "github.com/seu-usuario/davenport-crossdock-backend/internal/domain"

resolver:
  layout: follow-schema
  dir: internal/delivery/graphql/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

model:
  filename: internal/delivery/graphql/generated/models_gen.go
  package: generated

models:
  ID:
    model:
      - github.com/99designs/gqlgen/graphql.ID
  DateTime:
    model:
      - github.com/99designs/gqlgen/graphql.Time
