schema:
  - internal/delivery/graphql/schema/*.graphqls

exec:
  filename: internal/delivery/graphql/generated/generated.go
  package: generated

model:
  filename: internal/delivery/graphql/generated/models_gen.go
  package: generated

resolver:
  layout: follow-schema
  dir: internal/delivery/graphql/resolvers
  package: resolvers
  filename_template: "{name}.resolvers.go"

autobind:
  - github.com/joyvixtor/dock-scheduling-system/backend/appointments/internal/domain

federation:
  filename: internal/delivery/graphql/generated/federation.go
  package: generated
  version: 2
